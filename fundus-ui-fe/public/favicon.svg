<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="55%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Eye outline (lemon/almond shape) -->
  <path d="M8 32 C16 16 48 16 56 32 C48 48 16 48 8 32Z" fill="white" filter="url(#glow)"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="11" fill="url(#iris)"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="5.5" fill="#1e1b4b"/>
  <!-- Highlight specks -->
  <circle cx="36" cy="28" r="2.2" fill="white" opacity="0.9"/>
  <!-- Retinal scan ring lines -->
  <circle cx="32" cy="32" r="9"  stroke="white" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="32" cy="32" r="13" stroke="#7c3aed" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.35"/>
  <!-- Top lashes hint -->
  <path d="M22 22 C24 18 28 17 32 17 C36 17 40 18 42 22" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
